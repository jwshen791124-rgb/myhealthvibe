services:
  - type: web
    name: myhealthvibe-dashboard
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: HEALTH_DB_PATH
        value: /var/data/health_dashboard.db
    disk:
      name: myhealthvibe-data
      mountPath: /var/data
      sizeGB: 1
